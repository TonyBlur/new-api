name: Sync Upstream

on:
  schedule:
    # 每7天自动执行一次（UTC 周一 02:00，即北京时间 10:00）
    - cron: '0 2 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Sync from upstream
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.SYNC_UPSTREAM_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/Calcium-Ion/new-api.git || true
          git fetch upstream main

      - name: Check for changes
        id: check
        run: |
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/main)
          echo "local=$LOCAL" >> $GITHUB_OUTPUT
          echo "upstream=$UPSTREAM" >> $GITHUB_OUTPUT
          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "Already up to date with upstream."
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Upstream has new commits: $LOCAL → $UPSTREAM"
            git log --oneline HEAD..upstream/main | head -20
          fi

      - name: Try fast-forward merge
        id: merge
        if: steps.check.outputs.has_changes == 'true'
        run: |
          # Try merge with --no-edit (auto-resolve if possible)
          if git merge upstream/main --no-edit; then
            echo "merge_conflict=false" >> $GITHUB_OUTPUT
          else
            echo "merge_conflict=true" >> $GITHUB_OUTPUT
            git merge --abort
          fi

      - name: Direct push on success
        if: steps.merge.outputs.merge_conflict == 'false'
        run: |
          git push origin main
          echo "✅ Merged upstream directly into main"

      - name: Create PR on conflict
        if: steps.merge.outputs.merge_conflict == 'true'
        env:
          GH_TOKEN: ${{ secrets.SYNC_UPSTREAM_TOKEN }}
        run: |
          BRANCH="sync/upstream-$(date +'%Y%m%d-%H%M%S')"
          git checkout -b "$BRANCH"
          # Merge with conflict markers so the PR shows what conflicts exist
          git merge upstream/main --no-edit || true
          git add -A
          git commit -m "sync: merge upstream with conflicts" --allow-empty
          git push origin "$BRANCH"

          UPSTREAM_SHA=$(git rev-parse upstream/main | cut -c1-7)
          gh pr create \
            --title "sync: upstream main → ${UPSTREAM_SHA} (conflicts)" \
            --body "Automated sync from [Calcium-Ion/new-api](https://github.com/Calcium-Ion/new-api) upstream.

          ⚠️ **Merge conflicts detected** — manual resolution required.

          Upstream commits since last sync:
          $(git log --oneline origin/main..upstream/main)

          ---
          This PR was created automatically by the **sync-upstream** workflow." \
            --base main \
            --head "$BRANCH"

      - name: Summary
        if: always()
        run: |
          echo "### Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Local: \`${{ steps.check.outputs.local }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Upstream: \`${{ steps.check.outputs.upstream }}\`" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check.outputs.has_changes }}" = "false" ]; then
            echo "- ⏭️ Already up to date, no action needed" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.merge.outputs.merge_conflict }}" = "false" ]; then
            echo "- ✅ Merged upstream directly into main (no conflicts)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ⚠️ Merge conflicts detected, PR created for manual resolution" >> $GITHUB_STEP_SUMMARY
          fi
